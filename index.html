<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Jordd er en PWA for batteridrevne ESP32-sensorer som snakker direkte med jordd.com."
    />
    <meta name="theme-color" content="#11353e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Jordd</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Jordd Cloud</p>
          <h1 id="pageTitle">ESP32-sensorer direkte til jordd.com</h1>
        </div>
        <div class="topbar-actions">
          <button id="installButton" class="secondary-button" type="button" hidden>Installer</button>
          <nav id="primaryNav" class="topbar-nav" hidden></nav>
        </div>
      </header>

      <main class="main-content">
        <section id="appMessage" class="inline-feedback global-message" hidden></section>
        <section id="appView" class="panel view"></section>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
