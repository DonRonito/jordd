name: Deploy Jordd Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static bundle
        run: |
          mkdir -p _site/icons
          cp index.html app.js styles.css manifest.webmanifest sw.js _site/
          cp icons/icon.svg icons/icon-maskable.svg _site/icons/
          cat > _site/config.js <<EOF
          window.JORDD_CONFIG = {
            supabaseUrl: "${{ secrets.SUPABASE_URL }}",
            supabaseAnonKey: "${{ secrets.SUPABASE_ANON_KEY }}",
            inviteCode: "testpilot26",
            deviceApiBase: "${{ secrets.JORDD_DEVICE_API_BASE }}"
          };
          EOF
          echo "jordd.com" > _site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
